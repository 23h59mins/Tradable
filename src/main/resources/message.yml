    invalid-syntax: "%prefix%&cInvalid setprice syntax."
    held-item-footer: "&8вЂў &7Hold the target shop item in your main hand."
    held-example: "&8вЂў &7Example: &e/tradable setprice Mob Drops 2.5K"
    slot-example: "&8вЂў &7Example: &e/tradable setprice Mob Drops 1 250"
    category-not-found: "%prefix%&cThat category does not exist."
    category-not-found-footer: "&8вЂў &7Tried to find: &e%category%"
    no-item-in-slot: "%prefix%&cNo shop item exists in that category slot."
    hold-item: "%prefix%&cHold the target shop item in your main hand."
    no-matching-item: "%prefix%&cNo matching shop item was found in category &e%category%&c."
    no-matching-item-footer: "&8вЂў &7Tip: hold the exact item you added to the shop."
    slot-success: "%prefix%&aSet price of item in &e%category% &aslot &e%slot% &ato &e$%price%&a."
    held-success: "%prefix%&aSet price of held item in &e%category% &ato &e$%price%&a."

