admin-commands:
  addmoney:
    usage: "/tradable addmoney [player] <money>"
    success: "%prefix%&aAdded &e$%amount% &ato &e%target%&a."
    notify-target: "%prefix%&aYour balance increased by &e$%amount%&a."

  minusmoney:
    usage: "/tradable minusmoney [player] <money>"
    success: "%prefix%&aRemoved &e$%amount% &afrom &e%target%&a."
    failed: "%prefix%&cFailed to remove money."
    notify-target: "%prefix%&cYour balance decreased by &e$%amount%&c."

  addcategory:
    usage: "/tradable addcategory <name> <slot>"
    invalid-slot: "%prefix%&cSlot must be a positive integer starting from 1."
    invalid-slot-example: "&8вЂў &7Example: &e/tradable addcategory Mob Drops 2"
