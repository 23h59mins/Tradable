    existing-invalid-price: "%prefix%&cThe existing item has no valid price."
    existing-invalid-price-footer: "&8вЂў &7Use: &e/tradable additem %category% %slot% <price>"
    new-item-needs-price: "%prefix%&cNew shop items must have a positive price."
    new-item-needs-price-footer: "&8вЂў &7Example: &e/tradable additem %category% %slot% 100"
    added: "%prefix%&aAdded held item to &e%category% &aat absolute slot &e%absolute_slot% &a(page &e%page%&a, slot &e%slot%&a)."
    replaced: "%prefix%&aReplaced item in &e%category% &aat absolute slot &e%absolute_slot% &a(page &e%page%&a, slot &e%slot%&a)."
    price-footer: "&8вЂў &7Price: &e$%price%"
    failed: "%prefix%&cFailed to save item. Check config.yml and console logs."

  removeitem:
    usage: "/tradable removeitem"
    hold-item: "%prefix%&cHold the item in your main hand."
    no-categories: "%prefix%&cThere are no categories configured."
    no-match: "%prefix%&cNo matching shop item was found."
    success: "%prefix%&aRemoved &e%count% &amatching shop entr%plural%."
    plural-single: "y"
    plural-multiple: "ies"

  setprice:
    usage-held: "/tradable setprice <category> <price>"
