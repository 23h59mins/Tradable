    already-exists-footer: "&8вЂў &7Existing category: &e%category%"
    data-missing: "%prefix%&cThe category data could not be loaded."
    success: "%prefix%&aRenamed category &e%old_name% &ato &e%new_name%&a."
    failed: "%prefix%&cFailed to rename category. Check config.yml and console logs."

  removecategory:
    usage: "/tradable removecategory <name>"
    not-found: "%prefix%&cThat category does not exist."
    not-found-footer: "&8вЂў &7Tried to find: &e%category%"
    success: "%prefix%&aRemoved category &e%category%&a."
    failed: "%prefix%&cFailed to remove category. Check config.yml and console logs."

  removeallcategory:
    usage: "/tradable removeallcategory"
    success: "%prefix%&aRemoved &e%count% &ashop categor%plural%."
    plural-single: "y"
    plural-multiple: "ies"

  additem:
    usage: "/tradable additem <category> <slot> <price>"
    usage-footer: "&8вЂў &7When replacing an existing item, price may be omitted to keep the current price."
    category-not-found: "%prefix%&cThat category does not exist."
    category-not-found-footer: "&8вЂў &7Tried to find: &e%category%"
    hold-item: "%prefix%&cHold the item in your main hand."
